global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: fastlivery-configserver
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["configserver:8071"]
        labels:
          application: configserver

  - job_name: fastlivery-eurekaserver
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["eurekaserver:8070"]
        labels:
          application: eurekaserver

  - job_name: fastlivery-gatewayserver
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gatewayserver:8088"]
        labels:
          application: gatewayserver

  - job_name: fastlivery-users
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["users:8085"]
        labels:
          application: users

  - job_name: fastlivery-shipments
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["shipments:8086"]
        labels:
          application: shipments

  - job_name: fastlivery-pricing
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["pricing:8087"]
        labels:
          application: pricing

  - job_name: fastlivery-localhost
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "host.docker.internal:8070"
          - "host.docker.internal:8071"
          - "host.docker.internal:8085"
          - "host.docker.internal:8086"
          - "host.docker.internal:8087"
          - "host.docker.internal:8088"
        labels:
          application: local-fastlivery
