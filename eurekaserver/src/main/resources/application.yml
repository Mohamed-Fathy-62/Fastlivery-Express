server:
  port: 8070
spring:
  application:
    name: "eurekaserver"
  config:
    import: "optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8071/"

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true

eureka:
  instance:
    hostname: ${EUREKA_SERVER_HOST:localhost}
  client:
    fetchRegistry: false
    registerWithEureka: false
    serviceUrl:
      defaultZone: http://${EUREKA_SERVER_HOST:localhost}:8070/eureka/
    service-url:
      defaultZone: http://${EUREKA_SERVER_HOST:localhost}:8070/eureka/
