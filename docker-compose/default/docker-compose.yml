services:
  configserver:
    build:
      context: ../../configserver
    image: fastlivery/configserver:local
    container_name: configserver-ms
    ports:
      - "8071:8071"
    healthcheck:
      test: "curl --fail --silent localhost:8071/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    extends:
      file: common-config.yml
      service: microservice-base-config

  eurekaserver:
    build:
      context: ../../eurekaserver
    image: fastlivery/eurekaserver:local
    container_name: eurekaserver-ms
    ports:
      - "8070:8070"
    depends_on:
      configserver:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8070/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    environment:
      SPRING_APPLICATION_NAME: "eurekaserver"
      EUREKA_CLIENT_FETCH_REGISTRY: false
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: false
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://eurekaserver:8070/eureka/
      EUREKA_INSTANCE_HOSTNAME: eurekaserver
    extends:
      file: common-config.yml
      service: microservice-configserver-config

  gatewayserver:
    build:
      context: ../../gatewayserver
    image: fastlivery/gatewayserver:local
    container_name: gatewayserver-ms
    ports:
      - "8088:8088"
    depends_on:
      configserver:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "gatewayserver"
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: host.docker.internal
      SPRING_DATA_REDIS_PORT: 6379
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: "rabbitmq-diagnostics -q ping"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    extends:
      file: common-config.yml
      service: network-deploy-service

  users:
    build:
      context: ../../user
    image: fastlivery/user-service:local
    container_name: users-ms
    ports:
      - "8085:8085"
    depends_on:
      configserver:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "users"
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  shipments:
    build:
      context: ../../shipment
    image: fastlivery/shipment-service:local
    container_name: shipments-ms
    ports:
      - "8086:8086"
    depends_on:
      configserver:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "shipments"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_HOST: rabbitmq
      CLIENTS_USERS_URL: http://users:8085
      CLIENTS_PRICING_URL: http://pricing:8087
      USERS_SERVICE_HOST: users
      PRICING_SERVICE_HOST: pricing
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  pricing:
    build:
      context: ../../pricing
    image: fastlivery/pricing-service:local
    container_name: pricing-ms
    ports:
      - "8087:8087"
    depends_on:
      configserver:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "pricing"
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: host.docker.internal
      SPRING_DATA_REDIS_PORT: 6379
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  notifications:
    build:
      context: ../../notification
    image: fastlivery/notification-service:local
    container_name: notifications-ms
    ports:
      - "8089:8089"
    depends_on:
      configserver:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "notifications"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_HOST: rabbitmq
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ../../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extends:
      file: common-config.yml
      service: network-deploy-service

  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    ports:
      - "3100:3100"
    command: "-config.file=/etc/loki/loki.yml"
    volumes:
      - ../../observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    extends:
      file: common-config.yml
      service: network-deploy-service

  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    command: "-config.file=/etc/promtail/promtail.yml"
    volumes:
      - ../../observability/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    extends:
      file: common-config.yml
      service: network-deploy-service

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana-data:/var/lib/grafana
      - ../../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    extends:
      file: common-config.yml
      service: network-deploy-service

networks:
  fastlivery:
    driver: "bridge"

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
