server:
  port: 8088
  reactive:
    session:
      cookie:
        same-site: lax
        secure: false
spring:
  application:
    name: "gatewayserver"
  config:
    import: "optional:configserver:http://localhost:8071/"
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lowerCaseServiceId: true
      routes:
        - id: USERS
          uri: lb://users
          predicates:
            - Path=/api/users/**
          filters:
            - TokenRelay
            - AddRequestHeader=X-Test-Token, relayed
            - removeRequestHeader=Cookie
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: fastlivery-express-gateway
            client-secret: kuLDM3YGeP2V3olNBVxM79wPFibnwb3e
            scope: openid, profile, email, roles
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:8088/login/oauth2/code/keycloak"
        provider:
          keycloak:
            issuer-uri: http://localhost:9095/realms/fastlivery-express
  spring:
    data:
      redis:
        host: localhost
        port: 6379
        save-mode: always
    session:
      store-type: redis
eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      access: unrestricted
  info:
    env:
      enabled: true

info:
  app:
    name: "gatewayserver"
    description: "fastlivery express Gateway Server Application"
    version: "1.0.0"

logging:
  level:
    com:
      fastlivery-express:
        gatewayserver: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.server.adapter.HttpWebHandlerAdapter: TRACE

