server:
  port: 8088
spring:
  main:
    web-application-type: reactive
  application:
    name: "gatewayserver"
  config:
    import: "optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8071/"
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lowerCaseServiceId: true
      routes:
        - id: USERS
          uri: lb://users
          predicates:
            - Path=/api/v1/users/**,/api/v1/customers/**,/api/v1/drivers/**
        - id: SHIPMENTS
          uri: lb://shipments
          predicates:
            - Path=/api/v1/shipments/**
        - id: PRICING
          uri: lb://pricing
          predicates:
            - Path=/api/v1/pricing/**


  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://${EUREKA_SERVER_HOST:localhost}:8070/eureka/

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      access: unrestricted
  info:
    env:
      enabled: true

info:
  app:
    name: "gatewayserver"
    description: "fastlivery express Gateway Server Application"
    version: "1.0.0"

logging:
  level:
    com:
      fastlivery-express:
        gatewayserver: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.server.adapter.HttpWebHandlerAdapter: TRACE
