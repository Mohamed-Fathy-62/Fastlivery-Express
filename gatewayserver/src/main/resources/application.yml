server:
  port: 8088
spring:
  main:
    web-application-type: reactive
  application:
    name: "gatewayserver"
  config:
    import: "optional:configserver:http://localhost:8071/"
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lowerCaseServiceId: true
      routes:
        - id: USERS
          uri: lb://users
          predicates:
            - Path=/api/users/**


  data:
    redis:
      host: localhost
      port: 6379

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      access: unrestricted
  info:
    env:
      enabled: true

info:
  app:
    name: "gatewayserver"
    description: "fastlivery express Gateway Server Application"
    version: "1.0.0"

logging:
  level:
    com:
      fastlivery-express:
        gatewayserver: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.server.adapter.HttpWebHandlerAdapter: TRACE

