server:
  port: 8089

spring:
  application:
    name: notifications
  config:
    import: "optional:configserver:http://localhost:8071/"
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/

notifications:
  events:
    exchange: fastlivery.shipments.exchange
    queue: fastlivery.notifications.shipments.queue
    routing-key: shipments.events

info:
  app:
    name: "notifications"
    description: "notifications microservice for Fastlivery Express"
