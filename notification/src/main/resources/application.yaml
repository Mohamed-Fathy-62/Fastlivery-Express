server:
  port: 8089

spring:
  application:
    name: notifications
  config:
    import: "optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8071/"
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: guest
    password: guest

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://${EUREKA_SERVER_HOST:localhost}:8070/eureka/

notifications:
  events:
    exchange: fastlivery.shipments.exchange
    queue: fastlivery.notifications.shipments.queue
    routing-key: shipments.events

info:
  app:
    name: "notifications"
    description: "notifications microservice for Fastlivery Express"
