server:
  port: 8086

spring:
  application:
    name: shipments
  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/fedb
    username: postgres
    password: 622000
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  config:
    import: "configserver:http://${CONFIG_SERVER_HOST:localhost}:8071/"
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: guest
    password: guest
management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      access: unrestricted
  info:
    env:
      enabled: true

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://${EUREKA_SERVER_HOST:localhost}:8070/eureka/

info:
  app:
    name: "shipments"
    description: "shipments microservice for Fastlivery Express"

clients:
  users:
    url: http://${USERS_SERVICE_HOST:localhost}:8085
  pricing:
    url: http://${PRICING_SERVICE_HOST:localhost}:8087

shipments:
  quote:
    expiry-minutes: 10
    cleanup-fixed-delay-ms: 60000
  events:
    exchange: fastlivery.shipments.exchange
    queue: fastlivery.notifications.shipments.queue
    routing-key: shipments.events
