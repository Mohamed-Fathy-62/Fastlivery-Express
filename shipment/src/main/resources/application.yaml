server:
  port: 8086

spring:
  application:
    name: shipments
  datasource:
    url: jdbc:postgresql://localhost:5432/fedb
    username: postgres
    password: 622000
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  config:
    import: "configserver:http://localhost:8071/"
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      access: unrestricted
  info:
    env:
      enabled: true

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/

info:
  app:
    name: "shipments"
    description: "shipments microservice for Fastlivery Express"

clients:
  users:
    url: http://localhost:8085
  pricing:
    url: http://localhost:8087

shipments:
  quote:
    expiry-minutes: 10
    cleanup-fixed-delay-ms: 60000

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_51TYaWLGiEfDo5eXhTvN2KB6TRuUnrkM9ZFKlXcSItGPRSoDQPSmMoW4iSHQtHcHiagIbl3mk46e8gIThXp8liuxO00Oq05Q0U9}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_51TYaWLGiEfDo5eXhxgAHSmQghrMuxsFSbcrtTdygXIQbr2z3z5sOCzxeQU3kjJQRqfF3Yq2JPRkadv98rlEP8vdk00cArJK7iS}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  currency: egp
  success-url: http://localhost:3000/payment/success?session_id={CHECKOUT_SESSION_ID}
  cancel-url: http://localhost:3000/payment/cancel
